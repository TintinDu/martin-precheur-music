<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>martin precheur — music</title>
    <meta name="description" content="Martin Precheur — what I listen to, what I play." />

    <style>
      :root {
        --color-bg: #050510;
        --color-bg2: #0a0a1a;
        --color-surface: #0f0f22;
        --color-border: rgba(80, 180, 255, 0.15);
        --color-blue: #50b4ff;
        --color-blue-bright: #7dd4ff;
        --color-blue-dim: rgba(80, 180, 255, 0.25);
        --color-purple: #8844ff;
        --color-purple-dim: rgba(136, 68, 255, 0.3);
        --color-green: #00ff88;
        --color-green-dim: rgba(0, 255, 136, 0.25);
        --color-white: #e8f0ff;
        --color-text: #9ab4d4;
        --color-text-dim: rgba(154, 180, 212, 0.45);
        --color-text-muted: rgba(154, 180, 212, 0.22);
        --color-red: #ff3355;

        --font-pixel: 'Press Start 2P', monospace;
        --font-display: 'Orbitron', sans-serif;
        --font-body: 'Share Tech Mono', monospace;

        --timing-fast: 0.15s;
        --timing-normal: 0.3s;
        --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1.0);
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--color-bg);
        color: var(--color-text);
        overflow-x: hidden;
      }
      /* CRT scanlines overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.08) 2px,
          rgba(0, 0, 0, 0.08) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
